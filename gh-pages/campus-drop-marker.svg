  <text x="134" y="678" fill="#13201f" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="900">Drop</text>
  <text x="138" y="756" fill="#394743" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Scan this image to open today's mission.</text>
  <g transform="translate(300 860)">
