<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Campus Drop demo marker poster</title>
  <desc id="desc">A high contrast campus poster marker for the Campus Drop WebAR demo.</desc>
  <rect width="1200" height="1600" fill="#fffdf7"/>
  <rect x="64" y="64" width="1072" height="1472" rx="56" fill="#e8fbf1" stroke="#13201f" stroke-width="18"/>
  <circle cx="1004" cy="194" r="82" fill="#ffcc4d" stroke="#13201f" stroke-width="14"/>
  <path d="M166 1060 C332 914 472 1166 650 1014 C790 894 894 974 1034 858" fill="none" stroke="#11866c" stroke-width="22" stroke-linecap="round" stroke-dasharray="22 34"/>
  <g transform="translate(134 148)">
    <rect width="192" height="192" rx="28" fill="#20d6a3" stroke="#13201f" stroke-width="16"/>
