    <rect x="394" y="78" width="128" height="128" rx="18" fill="#20d6a3"/>
    <rect x="78" y="214" width="128" height="128" rx="18" fill="#ffcc4d"/>
    <rect x="394" y="214" width="128" height="128" rx="18" fill="#ffcc4d"/>
    <rect x="238" y="104" width="124" height="66" rx="16" fill="#13201f"/>
